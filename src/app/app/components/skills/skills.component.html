<section id="skills" class="section" appScrollReveal>
  <div class="container fade-in">
    <h2>Skills</h2>
    <p class="lead">
      A practical stack focused on building maintainable Angular apps—clean UI components, predictable state, and secure API integration.
    </p>

    <div class="grid grid-2 skills-grid">
      <div class="card skill-group" *ngFor="let group of skillGroups; trackBy: trackGroup">
        <h3>{{ group.title }}</h3>
        <div class="skill-tiles">
          <div class="skill-tile" *ngFor="let item of group.items; trackBy: trackByFn">
            <img class="skill-tile__icon" [src]="item.icon" [alt]="item.label" loading="lazy" />
            <div class="skill-tile__label">{{ item.label }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
