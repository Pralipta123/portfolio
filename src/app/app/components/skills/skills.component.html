<section id="skills" class="section">
  <div class="container fade-in">
    <h2>Skills</h2>
    <p class="lead">
      A practical stack focused on building maintainable Angular apps—clean UI components, predictable state, and secure API integration.
    </p>

    <div class="grid grid-3 skills-grid">
      <div class="card" *ngFor="let group of skillGroups">
        <h3>{{ group.title }}</h3>
        <div class="chips">
          <span class="chip chip--skill" *ngFor="let item of group.items; trackBy: trackByFn">{{ item }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
