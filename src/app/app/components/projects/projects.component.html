<section id="projects" class="section">
  <div class="container fade-in">
    <div class="projects-head">
      <div>
        <h2>Projects</h2>
        <p class="lead">
          Selected work showcasing scalable Angular architecture, role-based flows, and production-ready UI patterns.
        </p>
      </div>
      <div class="projects-cta">
        <a class="btn ghost" href="#contact">Request full resume</a>
      </div>
    </div>

    <div class="grid grid-2">
      <article class="card project" *ngFor="let p of projects; trackBy: trackByTitle">
        <div class="project__top">
          <h3>{{ p.title }}</h3>
          <a
            *ngIf="p.link"
            class="project__link"
            [href]="p.link"
            target="_blank"
            rel="noreferrer noopener"
          >
            Live →
          </a>
        </div>
        <p class="muted project__sub">{{ p.subtitle }}</p>

        <ul class="project__list">
          <li *ngFor="let b of p.bullets">{{ b }}</li>
        </ul>

        <div class="project__tags">
          <span class="chip" *ngFor="let t of p.tags">{{ t }}</span>
        </div>
      </article>
    </div>
  </div>
</section>
