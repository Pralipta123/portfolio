# Build Angular and deploy static site to GitHub Pages (no Jekyll).
# Repo Settings → Pages → Build: GitHub Actions → select this workflow / environment "github-pages".

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compute base href for GitHub Pages
        id: base
        shell: bash
        run: |
          NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$NAME" = "${OWNER}.github.io" ]; then
            echo "href=/" >> "$GITHUB_OUTPUT"
          else
            echo "href=/${NAME}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Angular (production)
        run: npx ng build --configuration=production --base-href="${{ steps.base.outputs.href }}"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/portfolio

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
